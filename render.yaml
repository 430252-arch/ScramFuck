services:
  - type: web
    name: ep-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: your-admin@email.com
      - key: DATA_DIR
        value: /var/data
    disk:
      name: ep-data
      mountPath: /var/data
      sizeGB: 1
